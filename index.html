<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>花火会場AR体験 🎆</title>

  <!-- A-Frame -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <!-- AR.js (マーカーベース版) -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #0a0010;
      color: #fff;
      overflow: hidden;
    }

    /* ── UIオーバーレイ ── */
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    /* タイトルバー */
    #title-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: linear-gradient(180deg, rgba(10,0,20,0.85) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #title-bar .logo {
      font-size: 22px;
    }

    #title-bar .title-text {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #ffcc44;
      text-shadow: 0 0 12px rgba(255,200,0,0.8);
    }

    #title-bar .subtitle {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.05em;
    }

    /* ステータスバー */
    #status-bar {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,200,0,0.3);
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
      backdrop-filter: blur(8px);
      transition: all 0.3s;
    }

    #status-bar.found {
      border-color: rgba(100,255,150,0.5);
      color: #88ffaa;
      background: rgba(0,40,20,0.7);
    }

    /* ボトムメニュー */
    #bottom-menu {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 12px 16px 24px;
      background: linear-gradient(0deg, rgba(10,0,20,0.9) 0%, transparent 100%);
      display: flex;
      gap: 8px;
      pointer-events: all;
    }

    .menu-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 11px;
      text-align: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .menu-btn:active {
      background: rgba(255,200,0,0.2);
      border-color: rgba(255,200,0,0.5);
      transform: scale(0.95);
    }

    .menu-btn .btn-icon {
      font-size: 18px;
      display: block;
      margin-bottom: 4px;
    }

    .menu-btn.active {
      background: rgba(255,200,0,0.15);
      border-color: rgba(255,200,0,0.6);
      color: #ffcc44;
    }

    /* スプラッシュ画面 */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0030 0%, #050008 100%);
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.5s;
    }

    #splash .splash-emoji {
      font-size: 64px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    #splash h1 {
      font-size: 24px;
      font-weight: 900;
      color: #ffcc44;
      text-shadow: 0 0 30px rgba(255,200,0,0.6);
      letter-spacing: 0.1em;
      text-align: center;
    }

    #splash p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      text-align: center;
      line-height: 1.8;
      max-width: 280px;
    }

    #splash .start-btn {
      margin-top: 10px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #ff6b00, #ffcc00);
      border: none;
      border-radius: 30px;
      color: #000;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.1em;
      cursor: pointer;
      pointer-events: all;
      box-shadow: 0 0 30px rgba(255,150,0,0.5);
      animation: pulse-btn 2s ease-in-out infinite;
    }

    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 20px rgba(255,150,0,0.4); }
      50% { box-shadow: 0 0 40px rgba(255,150,0,0.8); }
    }

    #splash .note {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* マーカー説明モーダル */
    #marker-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #marker-modal.show {
      display: flex;
    }

    #marker-modal .modal-box {
      background: #0f0020;
      border: 1px solid rgba(255,200,0,0.3);
      border-radius: 20px;
      padding: 24px;
      max-width: 320px;
      width: 100%;
      text-align: center;
    }

    #marker-modal h2 {
      font-size: 16px;
      color: #ffcc44;
      margin-bottom: 12px;
    }

    #marker-modal p {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      line-height: 1.8;
      margin-bottom: 16px;
    }

    #marker-modal .marker-preview {
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }

    #marker-modal .close-btn {
      padding: 10px 30px;
      background: rgba(255,200,0,0.2);
      border: 1px solid rgba(255,200,0,0.4);
      border-radius: 20px;
      color: #ffcc44;
      font-size: 13px;
      cursor: pointer;
      pointer-events: all;
    }

    /* パーティクル背景 */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particle-rise linear infinite;
      opacity: 0;
    }

    @keyframes particle-rise {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* インフォパネル */
    #info-panel {
      position: absolute;
      top: 70px;
      left: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,200,0,0.2);
      border-radius: 16px;
      padding: 14px 16px;
      backdrop-filter: blur(10px);
      display: none;
      pointer-events: all;
    }

    #info-panel.show { display: block; }

    #info-panel h3 {
      font-size: 13px;
      color: #ffcc44;
      margin-bottom: 8px;
    }

    #info-panel ul {
      list-style: none;
      font-size: 12px;
      color: rgba(255,255,255,0.8);
      line-height: 2;
    }

    #info-panel ul li::before {
      content: '📍 ';
    }

    #info-panel .close-x {
      position: absolute;
      top: 10px; right: 14px;
      font-size: 18px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
    }
  </style>
</head>
<body>

<!-- パーティクル背景 -->
<div id="particles"></div>

<!-- スプラッシュ -->
<div id="splash">
  <div class="splash-emoji">🎆</div>
  <h1>花火会場<br>AR体験</h1>
  <p>スマホカメラをかざすだけで<br>AR空間にキャラクターや<br>案内が現れます！</p>
  <button class="start-btn" onclick="startAR()">▶ AR をはじめる</button>
  <p class="note">カメラの許可が必要です</p>
</div>

<!-- マーカー説明モーダル -->
<div id="marker-modal">
  <div class="modal-box">
    <h2>📋 マーカーの使い方</h2>
    <div class="marker-preview">🎯</div>
    <p>
      印刷したHiroマーカー（または画面表示）に<br>
      カメラを向けると<br>
      3Dキャラクターが出現します！
    </p>
    <button class="close-btn" onclick="closeMarkerModal()">閉じる</button>
  </div>
</div>

<!-- A-Frame シーン（スプラッシュ後に表示） -->
<a-scene
  id="ar-scene"
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
  vr-mode-ui="enabled: false"
  style="display:none; position:fixed; inset:0; z-index:10;"
>

  <!-- アセット定義 -->
  <a-assets>
    <!-- サンプル用：シンプルなプリミティブでキャラを表現 -->
    <!-- 本番では <a-asset-item id="myModel" src="model.glb"></a-asset-item> -->
  </a-assets>

  <!-- === マーカー1：レンコンキャラ === -->
  <a-marker preset="hiro" id="marker-renkon">

    <!-- 体（円柱） -->
    <a-cylinder
      position="0 0.6 0"
      radius="0.25"
      height="0.8"
      color="#e8f5e9"
      opacity="0.95"
    ></a-cylinder>

    <!-- 穴（レンコンらしく） -->
    <a-torus position="0 0.6 0" radius="0.1" radius-tubular="0.04" color="#c8e6c9" rotation="90 0 0"></a-torus>

    <!-- 顔 -->
    <a-sphere position="0 1.2 0" radius="0.28" color="#fff9c4"></a-sphere>

    <!-- 目 -->
    <a-sphere position="-0.1 1.28 0.22" radius="0.05" color="#333"></a-sphere>
    <a-sphere position="0.1 1.28 0.22" radius="0.05" color="#333"></a-sphere>

    <!-- 笑顔（横棒） -->
    <a-box position="0 1.15 0.24" width="0.14" height="0.03" depth="0.02" color="#f06292"></a-box>

    <!-- 葉っぱ（手） -->
    <a-cone position="-0.4 0.8 0" radius-bottom="0.12" radius-top="0" height="0.3" color="#66bb6a" rotation="0 0 60"></a-cone>
    <a-cone position="0.4 0.8 0" radius-bottom="0.12" radius-top="0" height="0.3" color="#66bb6a" rotation="0 0 -60"></a-cone>

    <!-- 名前テキスト -->
    <a-text
      value="れんこんくん"
      position="0 1.7 0"
      align="center"
      color="#ffcc44"
      scale="0.6 0.6 0.6"
      look-at="[camera]"
    ></a-text>

    <!-- アニメーション：上下浮遊 -->
    <a-animation
      attribute="position"
      from="0 0 0"
      to="0 0.15 0"
      direction="alternate"
      dur="1800"
      repeat="indefinite"
      easing="ease-in-out-sine"
    ></a-animation>
  </a-marker>

  <!-- === マーカー2：花火案内板（matrixコード使用例） === -->
  <a-marker type="pattern" url="" preset="hiro" id="marker-map">
    <!-- 本番では別マーカーを使う -->
  </a-marker>

  <!-- カメラ -->
  <a-entity camera></a-entity>
</a-scene>

<!-- UIオーバーレイ（AR起動後に表示） -->
<div id="ui-overlay" style="display:none;">

  <!-- タイトルバー -->
  <div id="title-bar">
    <span class="logo">🎆</span>
    <div>
      <div class="title-text">花火会場 AR</div>
      <div class="subtitle">マーカーにカメラを向けてね</div>
    </div>
  </div>

  <!-- 会場案内パネル -->
  <div id="info-panel">
    <span class="close-x" onclick="toggleInfo()">✕</span>
    <h3>🗺 会場マップ</h3>
    <ul>
      <li>メイン打ち上げ場所（北側）</li>
      <li>出店エリア（東ゲート付近）</li>
      <li>トイレ（A・B・C地点）</li>
      <li>救護所（本部テント横）</li>
      <li>駐車場（南グラウンド）</li>
    </ul>
  </div>

  <!-- ステータス -->
  <div id="status-bar">📷 マーカーを探しています…</div>

  <!-- ボトムメニュー -->
  <div id="bottom-menu">
    <div class="menu-btn" onclick="toggleInfo()">
      <span class="btn-icon">🗺</span>
      会場案内
    </div>
    <div class="menu-btn" onclick="showMarkerModal()">
      <span class="btn-icon">🎯</span>
      マーカー
    </div>
    <div class="menu-btn" id="btn-renkon" onclick="highlightCharacter()">
      <span class="btn-icon">🌿</span>
      キャラ情報
    </div>
    <div class="menu-btn" onclick="shareAR()">
      <span class="btn-icon">📤</span>
      シェア
    </div>
  </div>
</div>

<script>
  // ── パーティクル生成 ──
  function createParticles() {
    const container = document.getElementById('particles');
    const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bb5'];
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        left: ${Math.random() * 100}%;
        animation-duration: ${Math.random() * 8 + 6}s;
        animation-delay: ${Math.random() * 8}s;
      `;
      container.appendChild(p);
    }
  }
  createParticles();

  // ── AR起動 ──
  function startAR() {
    const splash = document.getElementById('splash');
    const scene = document.getElementById('ar-scene');
    const ui = document.getElementById('ui-overlay');

    splash.style.opacity = '0';
    setTimeout(() => {
      splash.style.display = 'none';
      scene.style.display = 'block';
      ui.style.display = 'block';
    }, 500);

    // マーカー検出イベント
    setTimeout(() => {
      const marker = document.getElementById('marker-renkon');
      if (marker) {
        marker.addEventListener('markerFound', () => {
          const status = document.getElementById('status-bar');
          status.textContent = '✨ れんこんくん発見！';
          status.classList.add('found');
        });
        marker.addEventListener('markerLost', () => {
          const status = document.getElementById('status-bar');
          status.textContent = '📷 マーカーを探しています…';
          status.classList.remove('found');
        });
      }
    }, 1000);
  }

  // ── UIトグル ──
  function toggleInfo() {
    const panel = document.getElementById('info-panel');
    panel.classList.toggle('show');
  }

  function showMarkerModal() {
    document.getElementById('marker-modal').classList.add('show');
  }

  function closeMarkerModal() {
    document.getElementById('marker-modal').classList.remove('show');
  }

  function highlightCharacter() {
    const btn = document.getElementById('btn-renkon');
    btn.classList.toggle('active');
    const status = document.getElementById('status-bar');
    status.textContent = btn.classList.contains('active')
      ? '🌿 れんこんくん：五泉市のゆるキャラ！'
      : '📷 マーカーを探しています…';
  }

  function shareAR() {
    if (navigator.share) {
      navigator.share({
        title: '花火会場AR体験',
        text: 'ARでキャラクターが出てきたよ！🎆',
        url: window.location.href
      });
    } else {
      // フォールバック：URLコピー
      navigator.clipboard?.writeText(window.location.href);
      const status = document.getElementById('status-bar');
      status.textContent = '🔗 URLをコピーしました！';
      setTimeout(() => {
        status.textContent = '📷 マーカーを探しています…';
      }, 2000);
    }
  }
</script>
</body>
</html>
