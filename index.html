<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>はなびARあそび</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#06001a;color:#fff;height:100dvh;overflow:hidden;}
.screen{display:none;flex-direction:column;height:100dvh;align-items:center;justify-content:center;padding:24px;}
.screen.active{display:flex;}
#screen-top{background:radial-gradient(ellipse at 50% 40%,#1a0035 0%,#06001a 70%);}
.top-emoji{font-size:64px;animation:float 3s ease-in-out infinite;margin-bottom:16px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.top-title{font-size:28px;font-weight:900;text-align:center;line-height:1.3;margin-bottom:12px;background:linear-gradient(135deg,#ffcc44,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.top-desc{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;line-height:2;margin-bottom:32px;}
.upload-box{width:100%;max-width:320px;border:2px dashed rgba(100,180,255,0.5);border-radius:20px;padding:32px 24px;text-align:center;cursor:pointer;background:rgba(100,180,255,0.06);transition:all 0.2s;margin-bottom:16px;}
.upload-box .icon{font-size:48px;margin-bottom:12px;}
.upload-box .label{font-size:15px;color:rgba(255,255,255,0.8);margin-bottom:6px;}
.upload-box .sub{font-size:11px;color:rgba(255,255,255,0.35);}
.upload-box.selected{border-color:rgba(100,255,150,0.6);background:rgba(100,255,150,0.08);}
.upload-box.selected .label{color:#88ffaa;}
.start-btn{width:100%;max-width:320px;padding:16px;border:none;border-radius:16px;background:linear-gradient(135deg,#ff6b00,#ffcc00);color:#000;font-size:16px;font-weight:900;cursor:pointer;display:none;margin-bottom:12px;}
.start-btn.show{display:block;}

#screen-ar{display:none;position:fixed;inset:0;background:#000;}
#screen-ar.active{display:block;}
#arVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;}
#arCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
#markerCanvas{display:none;}

.ar-ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;}
.ar-header{padding:14px 16px 10px;background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;align-items:center;gap:10px;pointer-events:all;}
.ar-back{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;}
.ar-title{font-size:14px;font-weight:700;color:#ffcc44;}
.ar-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;}
.ar-status{margin:auto auto 0;padding:8px 20px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:20px;font-size:12px;color:rgba(255,255,255,0.8);text-align:center;transition:all 0.4s;}
.ar-status.found{border-color:rgba(100,255,150,0.5);color:#88ffaa;background:rgba(0,40,20,0.7);}
.ar-bottom{padding:12px 16px 28px;background:linear-gradient(0deg,rgba(0,0,0,0.75) 0%,transparent 100%);display:flex;gap:8px;pointer-events:all;}
.ar-btn{flex:1;padding:11px 8px;border-radius:14px;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:#fff;font-size:11px;text-align:center;cursor:pointer;}
.ar-btn .bi{font-size:20px;display:block;margin-bottom:3px;}
</style>
</head>
<body>

<div class="screen active" id="screen-top">
  <div class="top-emoji">🎆</div>
  <div class="top-title">はなびAR<br>あそび</div>
  <div class="top-desc">GLBファイルを選んで<br>マーカーの上に3Dモデルを出そう！</div>
  <div class="upload-box" id="uploadBox" onclick="document.getElementById('glbInput').click()">
    <div class="icon">🧊</div>
    <div class="label">GLBファイルを選ぶ</div>
    <div class="sub">タップしてファイルを選択</div>
  </div>
  <input type="file" id="glbInput" accept=".glb,.gltf" style="display:none;" onchange="handleGLB(this)">
  <button class="start-btn" id="startBtn" onclick="startAR()">ARをはじめる ▶</button>
</div>

<div id="screen-ar">
  <video id="arVideo" autoplay playsinline muted></video>
  <canvas id="arCanvas"></canvas>
  <canvas id="markerCanvas"></canvas>
  <div class="ar-ui">
    <div class="ar-header">
      <div class="ar-back" onclick="stopAR()">←</div>
      <div>
        <div class="ar-title">マーカーを探してね</div>
        <div class="ar-sub" id="arSub">Hiroマーカーに向けよう</div>
      </div>
    </div>
    <div class="ar-status" id="arStatus">⏳ 初期化中…</div>
    <div class="ar-bottom">
      <div class="ar-btn" onclick="stopAR()"><span class="bi">←</span>もどる</div>
      <div class="ar-btn" onclick="alert('スマホのスクショで撮ってね！')"><span class="bi">📸</span>写真を撮る</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
let glbURL = null;
let arStream = null;
let renderer, scene, camera, model;
let animId = null;
let arController = null;
let arToolkitSource = null;
let arToolkitContext = null;
let markerRoot = null;

function handleGLB(input) {
  const file = input.files[0];
  if(!file) return;
  if(glbURL) URL.revokeObjectURL(glbURL);
  glbURL = URL.createObjectURL(file);
  const box = document.getElementById('uploadBox');
  box.classList.add('selected');
  box.innerHTML = '<div class="icon">✅</div><div class="label">'+file.name+'</div><div class="sub">'+(file.size/1024).toFixed(1)+'KB</div>';
  document.getElementById('startBtn').classList.add('show');
}

async function startAR() {
  if(!glbURL) return;
  document.getElementById('screen-top').classList.remove('active');
  document.getElementById('screen-ar').classList.add('active');

  const canvas = document.getElementById('arCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // Three.js セットアップ
  renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setClearColor(0x000000, 0);

  scene = new THREE.Scene();
  camera = new THREE.Camera();
  scene.add(camera);

  // 照明
  scene.add(new THREE.AmbientLight(0xffffff, 1.5));
  const dir = new THREE.DirectionalLight(0xffffff, 1.0);
  dir.position.set(1, 2, 1);
  scene.add(dir);

  // ARToolKit セットアップ
  arToolkitSource = new THREEx.ArToolkitSource({ sourceType:'webcam' });
  arToolkitSource.init(() => {
    // ビデオ要素をarVideoに置き換え
    const srcVideo = arToolkitSource.domElement;
    srcVideo.style.position = 'absolute';
    srcVideo.style.inset = '0';
    srcVideo.style.width = '100%';
    srcVideo.style.height = '100%';
    srcVideo.style.objectFit = 'cover';
    srcVideo.style.zIndex = '1';
    document.getElementById('screen-ar').prepend(srcVideo);
    document.getElementById('arVideo').style.display = 'none';
    onResize();
    document.getElementById('arStatus').textContent = '📷 マーカーを探しています…';
    document.getElementById('arSub').textContent = 'Hiroマーカーに向けよう';
  });

  arToolkitContext = new THREEx.ArToolkitContext({
    cameraParametersUrl: 'https://raw.githack.com/AR-js-org/AR.js/master/data/data/camera_para.dat',
    detectionMode: 'mono',
  });
  arToolkitContext.init(() => {
    camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
  });

  // Hiroマーカー
  markerRoot = new THREE.Group();
  scene.add(markerRoot);
  arController = new THREEx.ArMarkerControls(arToolkitContext, markerRoot, {
    type: 'preset',
    patternUrl: 'hiro',
  });

  // GLB読み込み
  const loader = new THREE.GLTFLoader();
  loader.load(glbURL, (gltf) => {
    model = gltf.scene;
    const box3 = new THREE.Box3().setFromObject(model);
    const size = box3.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    model.scale.setScalar(1.0 / maxDim);
    model.position.set(0, 0.5, 0);
    markerRoot.add(model);
  });

  // マーカー検出イベント
  markerRoot.addEventListener('markerFound', () => {
    document.getElementById('arStatus').textContent = '✨ モデルが出た！';
    document.getElementById('arStatus').classList.add('found');
    document.getElementById('arSub').textContent = 'スクショで写真を撮ってね📸';
  });
  markerRoot.addEventListener('markerLost', () => {
    document.getElementById('arStatus').textContent = '📷 マーカーを探しています…';
    document.getElementById('arStatus').classList.remove('found');
    document.getElementById('arSub').textContent = 'Hiroマーカーに向けよう';
  });

  window.addEventListener('resize', onResize);

  // レンダリングループ
  function render() {
    animId = requestAnimationFrame(render);
    if(arToolkitSource && arToolkitSource.ready) {
      arToolkitContext.update(arToolkitSource.domElement);
    }
    renderer.render(scene, camera);
  }
  render();
}

function onResize() {
  if(arToolkitSource) arToolkitSource.onResizeElement();
  if(renderer) renderer.setSize(window.innerWidth, window.innerHeight);
  if(camera && arToolkitContext) {
    camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
  }
}

function stopAR() {
  if(animId){ cancelAnimationFrame(animId); animId = null; }
  if(arStream) arStream.getTracks().forEach(t => t.stop());
  arStream = null;
  if(renderer){ renderer.dispose(); renderer = null; }
  scene = null; camera = null; model = null;
  arController = null; arToolkitSource = null; arToolkitContext = null; markerRoot = null;
  document.getElementById('screen-ar').classList.remove('active');
  document.getElementById('screen-top').classList.add('active');
  document.getElementById('arStatus').textContent = '⏳ 初期化中…';
  document.getElementById('arStatus').classList.remove('found');
}
</script>

<!-- ARToolKit -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>
</body>
</html>
