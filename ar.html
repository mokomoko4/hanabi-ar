body{overflow:hidden;background:#000;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;}

#fxCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:7;pointer-events:none;}

/* UI レイヤー */
.ui{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;pointer-events:none;}
.header{
  padding:14px 16px 10px;
  background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,transparent 100%);
  display:flex;align-items:center;gap:10px;pointer-events:all;
}
.back{
  width:36px;height:36px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;color:#fff;text-decoration:none;flex-shrink:0;
}
.htitle{font-size:14px;font-weight:700;color:#ffcc44;}

}
.status{
  margin:auto auto 0;padding:8px 20px;

  max-width:calc(100% - 32px);
}
.status.green{border-color:rgba(100,255,150,0.5);color:#88ffaa;background:rgba(0,40,20,0.7);}

  padding:12px 16px 28px;

  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.93);

#gyroPrompt h2{font-size:22px;font-weight:900;color:#ffcc44;text-align:center;}

<body>

<video id="bgVideo" autoplay playsinline muted></video>
<canvas id="arCanvas"></canvas>
<canvas id="fxCanvas"></canvas>

<!-- iPhone ジャイロ許可 -->
<div id="gyroPrompt">

<div class="ui">

<script>
// ══════════════════════════════════════════════════
//  2D パーティクル エフェクト
// ══════════════════════════════════════════════════
const fxCanvas = document.getElementById('fxCanvas');
fxCanvas.width = window.innerWidth;
fxCanvas.height = window.innerHeight;
const fx2d = fxCanvas.getContext('2d');

const FW_COLORS = ['#ff4444','#ff8800','#ffee00','#44ff88','#4488ff','#cc44ff','#ff88cc','#44ffdd'];
const particles2D = [];

function spawnBurst(x, y, big) {
  const color = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
  const count = big ? 60 : 35;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * (big ? 7 : 4);
    particles2D.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color,
      life: 1.0,
      decay: 0.012 + Math.random() * 0.018,
      size: 2 + Math.random() * (big ? 4 : 2.5),
    });
  }
  playWhistle();
  setTimeout(() => playBoom(big ? 1.0 : 0.6), 420);
}

function renderFX() {
  fx2d.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  for (let i = particles2D.length - 1; i >= 0; i--) {
    const p = particles2D[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.12;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) { particles2D.splice(i, 1); continue; }
    fx2d.globalAlpha = p.life;
    fx2d.fillStyle = p.color;
    fx2d.beginPath();
    fx2d.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    fx2d.fill();
  }
  fx2d.globalAlpha = 1;
}

// ══════════════════════════════════════════════════
//  Web Audio（音量 30%）
// ══════════════════════════════════════════════════
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playWhistle() {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1500, ctx.currentTime + 0.45);
    g.gain.setValueAtTime(0.03, ctx.currentTime);          // 30% of 0.1
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.45);
  } catch(e) {}
}

function playBoom(vol) {
  try {
    const ctx = getAudio();
    const sr = ctx.sampleRate;
    const n = Math.floor(sr * 0.45);
    const buf = ctx.createBuffer(1, n, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (n * 0.12));
    const src = ctx.createBufferSource();
    const g = ctx.createGain();
    src.buffer = buf;
    g.gain.setValueAtTime(vol * 0.3, ctx.currentTime);    // 30%音量
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    src.connect(g); g.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

// ══════════════════════════════════════════════════
//  Three.js
// ══════════════════════════════════════════════════
const canvas = document.getElementById('arCanvas');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(
  60, window.innerWidth / window.innerHeight, 0.1, 100
);
camera.position.set(0, 0, 0);

scene.add(new THREE.AmbientLight(0xffffff, 2.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(1, 2, 1);
scene.add(dirLight);

// ══════════════════════════════════════════════════
//  カメラ背景（スマホカメラ映像）
// ══════════════════════════════════════════════════
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
  .then(stream => {
    document.getElementById('bgVideo').srcObject = stream;
    document.getElementById('arSub').textContent = 'スマホを動かして作品を見つけよう';
  })
  .catch(() => {
    document.getElementById('arSub').textContent = 'カメラの許可が必要です';
  });

// ══════════════════════════════════════════════════
//  3D → スクリーン座標変換
// ══════════════════════════════════════════════════
function worldToScreen(worldPos) {
  const v = worldPos.clone().project(camera);
  return {
    x: (v.x * 0.5 + 0.5) * window.innerWidth,
    y: (-v.y * 0.5 + 0.5) * window.innerHeight,
    // NDC: z<1 かつ x,y が画面内 → カメラ前方にある
    inFront: v.z < 1 && Math.abs(v.x) < 1.3 && Math.abs(v.y) < 1.3,
  };
}

// ══════════════════════════════════════════════════
//  Firebase
// ══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDGlQeMC6iJzWAB16teP_5oC2FeBcgZxmA",
  authDomain: "hanabi-ar-1754a.firebaseapp.com",
  databaseURL: "https://hanabi-ar-1754a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hanabi-ar-1754a",
  storageBucket: "hanabi-ar-1754a.firebasestorage.app",
  messagingSenderId: "861479696200",
  appId: "1:861479696200:web:393add8997cf25affd657d",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ══════════════════════════════════════════════════
//  作品管理
// ══════════════════════════════════════════════════
const WORK_RADIUS = 3.5;  // ユーザー周辺の球半径
const workObjects = [];   // {group, worldPos, scaleAnim, targetScale, ...}
const addedIds = new Set();

// Canvas テクスチャ生成（絵文字・名前付き）
function makeCanvasTex(color, emoji, name) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 300;
  const ctx = cv.getContext('2d');
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(0, 0, 256, 256, 32); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.roundRect(12, 12, 232, 232, 24); ctx.fill();
  ctx.font = '90px serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji || '🎆', 128, 110);
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath(); ctx.roundRect(0, 262, 256, 38, 8); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.fillText(name || 'さくひん', 128, 285);
  return new THREE.CanvasTexture(cv);
}

// PNG → Canvas テクスチャ（名前付き）
function makePngTex(url, name, cb) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const cv = document.createElement('canvas');
    cv.width = 256; cv.height = 300;
    const ctx = cv.getContext('2d');
    const s = Math.min(img.width, img.height);
    ctx.drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, 256, 256);
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.roundRect(0, 262, 256, 38, 8); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(name || 'さくひん', 128, 285);
    cb(new THREE.CanvasTexture(cv));
  };
  img.onerror = () => cb(null);
  img.src = url;
}

// 作品インデックスから世界座標を算出
function getWorkPos(idx) {
  const theta = (idx % 8) * (Math.PI * 2 / 8);
  const yOff  = Math.floor(idx / 8) * 0.7;
  return new THREE.Vector3(
    Math.sin(theta) * WORK_RADIUS,
    -0.2 + yOff,
    -Math.cos(theta) * WORK_RADIUS
  );
}

// Three.js Group を scene に登録
function registerWork(group, worldPos) {
  group.position.copy(worldPos);
  group.lookAt(0, 0, 0);   // 常にカメラ方向を向く
  group.scale.setScalar(0); // 初期は非表示
  group.visible = false;
  scene.add(group);

  const w = {
    group,
    worldPos: worldPos.clone(),
    scaleAnim: 0,
    targetScale: 0,
    floatPhase: Math.random() * Math.PI * 2,
    floatSpeed: 0.4 + Math.random() * 0.4,
    baseY: worldPos.y,
  };
  workObjects.push(w);
  document.getElementById('arCount').textContent = workObjects.length + ' 作品';

  // すでに「表示中」なら即出現させる
  if (showState === 'visible') {
    w.targetScale = 1;
    const sp = worldToScreen(worldPos);
    spawnBurst(
      sp.inFront ? sp.x : window.innerWidth  / 2 + (Math.random() - 0.5) * 300,
      sp.inFront ? sp.y : window.innerHeight / 2 + (Math.random() - 0.5) * 300,
      true
    );
  }
}

function addWork(work) {
  if (addedIds.has(work.id)) return;
  addedIds.add(work.id);
  const pos = getWorkPos(workObjects.length);

  if (work.type === 'canvas') {
    const tex = makeCanvasTex(work.color || '#ff6b00', work.emoji || '🎆', work.name);
    const geo = new THREE.PlaneGeometry(0.8, 0.8 * (300 / 256));
    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false });
    const g = new THREE.Group();
    g.add(new THREE.Mesh(geo, mat));
    registerWork(g, pos);

  } else if (work.type === 'png' && work.url) {
    makePngTex(work.url, work.name, tex => {
      if (!tex) return;
      const geo = new THREE.PlaneGeometry(0.8, 0.8 * (300 / 256));
      const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false });
      const g = new THREE.Group();
      g.add(new THREE.Mesh(geo, mat));
      registerWork(g, pos);
    });

  } else if (work.type === 'glb' && work.url) {
    const loader = new THREE.GLTFLoader();
    loader.load(work.url, gltf => {
      const model = gltf.scene;
      const box = new THREE.Box3().setFromObject(model);
      const sz  = box.getSize(new THREE.Vector3());
      model.scale.setScalar(0.65 / Math.max(sz.x, sz.y, sz.z));
      const g = new THREE.Group();
      g.add(model);
      registerWork(g, pos);
    }, undefined, () => {});
  }
}

db.ref('works').on('child_added', snap => {
  const w = snap.val(); w.id = snap.key;
  addWork(w);
});

// ══════════════════════════════════════════════════
//  出現・消滅アニメーション制御
// ══════════════════════════════════════════════════
let showState = 'hidden'; // 'hidden' | 'showing' | 'visible' | 'hiding'

function burstPosFor(w) {
  const sp = worldToScreen(w.worldPos);
  return {
    x: sp.inFront ? sp.x : window.innerWidth  / 2 + (Math.random() - 0.5) * 300,
    y: sp.inFront ? sp.y : window.innerHeight / 2 + (Math.random() - 0.5) * 300,
  };
}

function revealAll() {
  if (showState === 'showing' || showState === 'visible') return;
  showState = 'showing';
  setStatus('🎆 作品が出現中…');

  if (workObjects.length === 0) {
    showState = 'visible';
    setStatus('✨ もう一度タップすると消えるよ！');
    return;
  }
  workObjects.forEach((w, i) => {
    setTimeout(() => {
      w.targetScale = 1;
      const bp = burstPosFor(w);
      spawnBurst(bp.x, bp.y, true);
      if (i === workObjects.length - 1) {
        setTimeout(() => {
          showState = 'visible';
          setStatus('✨ もう一度タップすると消えるよ！');
        }, 700);
      }
    }, i * 600);
  });
}

function hideAll() {
  if (showState === 'hiding' || showState === 'hidden') return;
  showState = 'hiding';
  setStatus('💨 消えていく…');

  if (workObjects.length === 0) {
    showState = 'hidden';
    setStatus('🎆 タップして作品を出現させよう！');
    return;
  }
  workObjects.forEach((w, i) => {
    setTimeout(() => {
      w.targetScale = 0;
      const bp = burstPosFor(w);
      spawnBurst(bp.x, bp.y, false);
      if (i === workObjects.length - 1) {
        setTimeout(() => {
          showState = 'hidden';
          setStatus('🎆 タップして作品を出現させよう！');
        }, 800);
      }
    }, i * 400);
  });
}

function setStatus(msg) {
  document.getElementById('arStatus').textContent = msg;
}

// ══════════════════════════════════════════════════
//  ジャイロセンサー（空間固定）
// ══════════════════════════════════════════════════
let useGyro = false;
const gyroZee   = new THREE.Vector3(0, 0, 1);
const gyroEuler = new THREE.Euler();
const gyroQ0    = new THREE.Quaternion();
const gyroQ1    = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5));

function startGyro() {
  useGyro = true;
  window.addEventListener('deviceorientation', e => {
    if (e.alpha === null) return;
    // コンパスヘッディング（iOS: webkitCompassHeading / Android: 360-alpha）
    const heading = e.webkitCompassHeading != null
      ? THREE.MathUtils.degToRad(e.webkitCompassHeading)
      : THREE.MathUtils.degToRad(360 - e.alpha);

    gyroEuler.set(
      THREE.MathUtils.degToRad(e.beta),
      THREE.MathUtils.degToRad(e.alpha),
      THREE.MathUtils.degToRad(-e.gamma),
      'YXZ'
    );
    camera.quaternion.setFromEuler(gyroEuler);
    camera.quaternion.multiply(gyroQ1);
    camera.quaternion.multiply(gyroQ0.setFromAxisAngle(gyroZee, -heading));
  }, true);

  setStatus('🎆 タップして作品を出現させよう！');
  document.getElementById('arSub').textContent = 'スマホを動かして作品を見つけよう';
}

function requestGyro() {
  DeviceOrientationEvent.requestPermission()
    .then(state => {
      document.getElementById('gyroPrompt').style.display = 'none';
      if (state === 'granted') startGyro();
      else setStatus('🎆 タップして作品を出現させよう！');
    })
    .catch(() => {
      document.getElementById('gyroPrompt').style.display = 'none';
      setStatus('🎆 タップして作品を出現させよう！');
    });
}
document.getElementById('gyroBtn').onclick = requestGyro;

if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  // iPhone: 許可ダイアログを表示
  document.getElementById('gyroPrompt').style.display = 'flex';
} else if (typeof DeviceOrientationEvent !== 'undefined') {
  // Android: 自動的にジャイロ開始
  startGyro();
} else {
  // PC: マウスドラッグで操作
  setStatus('🎆 タップして作品を出現させよう！');
}

// ══════════════════════════════════════════════════
//  マウス / タッチドラッグ（PC・ジャイロ無し時のフォールバック）
// ══════════════════════════════════════════════════
let mouseDown = false, mouseMoved = false, lastMX = 0, lastMY = 0;
let touchMoved = false, lastTX = 0, lastTY = 0;
let yaw = 0, pitch = 0;

canvas.addEventListener('mousedown', e => {
  mouseDown = true; mouseMoved = false;
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  mouseMoved = true;
  yaw   += (e.clientX - lastMX) * 0.005;
  pitch += (e.clientY - lastMY) * 0.003;
  pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('mouseup', () => { mouseDown = false; });

canvas.addEventListener('touchstart', e => {
  touchMoved = false;
  lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY;
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (useGyro) return; // ジャイロ有効時はドラッグ不要
  touchMoved = true;
  yaw   += (e.touches[0].clientX - lastTX) * 0.005;
  pitch += (e.touches[0].clientY - lastTY) * 0.003;
  pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));
  lastTX = e.touches[0].clientX; lastTY = e.touches[0].clientY;
}, { passive: true });

// ══════════════════════════════════════════════════
//  タップ処理（出現 / 消滅トグル）
// ══════════════════════════════════════════════════
let lastTapMs = 0;

function handleTap() {
  const now = Date.now();
  if (now - lastTapMs < 400) return; // 連続タップ防止
  lastTapMs = now;
  try { getAudio().resume(); } catch(e) {}

  if (showState === 'hidden'  || showState === 'hiding')   revealAll();
  else if (showState === 'visible' || showState === 'showing') hideAll();
}

canvas.addEventListener('click',    e => { if (!mouseMoved)  handleTap(); });
canvas.addEventListener('touchend', e => { if (!touchMoved)  handleTap(); }, { passive: true });

// ══════════════════════════════════════════════════
//  レンダリングループ
// ══════════════════════════════════════════════════
let t = 0, lastFT = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastFT) / 1000, 0.05);
  lastFT = now;
  t += dt;

  // ジャイロなし時はマウス/タッチでカメラ回転
  if (!useGyro) {
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
  }

  workObjects.forEach(w => {
    // スケールのイージングアニメーション
    const diff = w.targetScale - w.scaleAnim;
    w.scaleAnim += diff * 0.08;
    if (Math.abs(diff) < 0.002) w.scaleAnim = w.targetScale;

    const s = w.scaleAnim;
    w.group.visible = s > 0.01;
    if (s > 0.01) {
      w.group.scale.setScalar(s);
      // ふわふわ浮遊
      w.group.position.y = w.baseY + Math.sin(t * w.floatSpeed + w.floatPhase) * 0.1;
      // 常にカメラを向くように更新
      w.group.lookAt(0, 0, 0);
    }
  });

  renderFX();
  renderer.render(scene, camera);
}
animate(performance.now());

// ══════════════════════════════════════════════════
//  リサイズ
// ══════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  fxCanvas.width  = window.innerWidth;
  fxCanvas.height = window.innerHeight;
});
</script>
</body>
